version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/quickcommerce
      DB_USER: qc
      DB_PASSWORD: qcpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-quickcommerce-verify-token}
      BLINKIT_API_KEY: ${BLINKIT_API_KEY:-mock}
      ZEPTO_API_KEY: ${ZEPTO_API_KEY:-mock}
      INSTAMART_API_KEY: ${INSTAMART_API_KEY:-mock}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quickcommerce
      POSTGRES_USER: qc
      POSTGRES_PASSWORD: qcpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qc -d quickcommerce"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

volumes:
  pgdata:
